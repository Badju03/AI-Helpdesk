<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI IT Helpdesk Assistant</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="chat-container">

    <div class="header">
        🤖 AI IT Helpdesk Assistant
    </div>

    <div id="chatWindow" class="chat-window">

        <div class="bot-message">
            Hello! 👋 I'm your IT Helpdesk Assistant.
            Ask me any IT support question.
        </div>

    </div>

    <div class="input-area">

        <textarea
            id="question"
            placeholder="Type your IT question..."
        ></textarea>

        <button onclick="askAI()">
            Send ➜
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
